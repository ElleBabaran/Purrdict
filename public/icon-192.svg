<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="64" height="64" fill="#1a1a2e" rx="12"/>
  
  <!-- Left ear -->
  <rect x="14" y="10" width="4" height="4" fill="#ff9f43"/>
  <rect x="18" y="10" width="4" height="4" fill="#ff9f43"/>
  <rect x="14" y="14" width="4" height="4" fill="#ff9f43"/>
  <rect x="18" y="14" width="4" height="4" fill="#ffbe76"/>
  <rect x="18" y="18" width="4" height="4" fill="#ff9f43"/>
  
  <!-- Right ear -->
  <rect x="42" y="10" width="4" height="4" fill="#ff9f43"/>
  <rect x="46" y="10" width="4" height="4" fill="#ff9f43"/>
  <rect x="42" y="14" width="4" height="4" fill="#ffbe76"/>
  <rect x="46" y="14" width="4" height="4" fill="#ff9f43"/>
  <rect x="42" y="18" width="4" height="4" fill="#ff9f43"/>
  
  <!-- Head fill -->
  <rect x="18" y="18" width="28" height="4" fill="#ff9f43"/>
  <rect x="14" y="22" width="36" height="4" fill="#ff9f43"/>
  <rect x="14" y="26" width="36" height="4" fill="#ff9f43"/>
  <rect x="14" y="30" width="36" height="4" fill="#ff9f43"/>
  <rect x="18" y="34" width="28" height="4" fill="#ff9f43"/>
  
  <!-- Eyes -->
  <rect x="22" y="26" width="4" height="4" fill="#2d3436"/>
  <rect x="22" y="26" width="2" height="2" fill="#ffffff"/>
  <rect x="38" y="26" width="4" height="4" fill="#2d3436"/>
  <rect x="38" y="26" width="2" height="2" fill="#ffffff"/>
  
  <!-- Nose -->
  <rect x="30" y="30" width="4" height="4" fill="#fd79a8"/>
  
  <!-- Mouth/cheeks -->
  <rect x="26" y="34" width="4" height="4" fill="#ffbe76"/>
  <rect x="34" y="34" width="4" height="4" fill="#ffbe76"/>
  
  <!-- Whiskers left -->
  <rect x="6" y="30" width="8" height="2" fill="#dfe6e9"/>
  <rect x="6" y="34" width="8" height="2" fill="#dfe6e9"/>
  
  <!-- Whiskers right -->
  <rect x="50" y="30" width="8" height="2" fill="#dfe6e9"/>
  <rect x="50" y="34" width="8" height="2" fill="#dfe6e9"/>
  
  <!-- "PD" text -->
  <rect x="22" y="42" width="2" height="10" fill="#a29bfe"/>
  <rect x="24" y="42" width="4" height="2" fill="#a29bfe"/>
  <rect x="28" y="44" width="2" height="2" fill="#a29bfe"/>
  <rect x="24" y="46" width="4" height="2" fill="#a29bfe"/>
  
  <rect x="34" y="42" width="2" height="10" fill="#a29bfe"/>
  <rect x="36" y="42" width="2" height="2" fill="#a29bfe"/>
  <rect x="38" y="44" width="2" height="6" fill="#a29bfe"/>
  <rect x="36" y="50" width="2" height="2" fill="#a29bfe"/>
</svg>
